<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - T-rix</title>
    <link rel="stylesheet" href="pico.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-geral">
        <div class="centralizar-texto" style="margin-top: 80px;">
            <img src="Logo T-rix.png" alt="T-rix" width="120">
            <p style="color: #8779ec; margin-bottom: 30px;">Acesse o sistema de triagem clínica</p>

            <div class="meu-formulario">
                <form action="menu.html">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" required placeholder="Nome de usuário">

                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">

                    <button type="submit">Entrar</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
